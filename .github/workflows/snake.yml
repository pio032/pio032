name: github contribution grid snake

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate Snake
        uses: Ileriayo/github-contribution-grid-snake@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
